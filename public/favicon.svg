<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Agent Studio Open app icon</title>
  <desc id="desc">An overlapping A and S mark on a dark operator-workbench field.</desc>
  <rect width="64" height="64" rx="13" fill="#101820"/>
  <rect x="1" y="1" width="62" height="62" rx="12" fill="none" stroke="#007582" stroke-width="2"/>
  <text x="25" y="47" fill="#f5f7fa" font-family="Arial, sans-serif" font-size="39" font-weight="800" text-anchor="middle">A</text>
  <text x="41" y="45" fill="#74c7ee" font-family="Arial, sans-serif" font-size="35" font-weight="800" text-anchor="middle">S</text>
  <circle cx="13" cy="17" r="3" fill="#b9ff48"/>
  <circle cx="52" cy="46" r="3" fill="#ffbd4a"/>
</svg>
