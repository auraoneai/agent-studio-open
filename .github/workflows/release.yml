name: Agent Studio Open Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v"
        required: true
        default: "0.1.0"
        type: string
      channel:
        description: "Release channel"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - beta
          - nightly

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.33.2"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64 DMG
            os: macos-14
            artifact_name: agent-studio-open-macos
            artifact_path: desktop/src-tauri/target/release/bundle/dmg/*.dmg
          - name: Windows x64 MSI
            os: windows-2022
            artifact_name: agent-studio-open-windows
            artifact_path: desktop/src-tauri/target/release/bundle/msi/*.msi
          - name: Linux x64 packages
            os: ubuntu-24.04
            artifact_name: agent-studio-open-linux
            artifact_path: |
              desktop/src-tauri/target/release/bundle/appimage/*.AppImage
              desktop/src-tauri/target/release/bundle/deb/*.deb
              desktop/src-tauri/target/release/bundle/rpm/*.rpm

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri and sandbox dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bubblewrap \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python CLI test dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest grpcio

      - name: Typecheck
        run: pnpm run typecheck

      - name: Renderer tests
        run: pnpm test -- --run

      - name: CLI tests
        shell: bash
        run: |
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 \
          PYTHONPATH=cli/src:vendor/mcp-risk-linter/src:vendor/a2a-contract-test/src:vendor/tool-call-replay/src:vendor/agent-trace-card/src:vendor/otel-eval-bridge/src \
          python -m pytest -q cli/tests

      - name: Desktop Rust tests
        run: cargo test --manifest-path desktop/src-tauri/Cargo.toml

      - name: Linux bubblewrap execution smoke
        if: runner.os == 'Linux'
        run: |
          sudo bwrap \
            --ro-bind /usr /usr \
            --ro-bind /bin /bin \
            --ro-bind /lib /lib \
            --ro-bind /lib64 /lib64 \
            --proc /proc \
            --dev /dev \
            --tmpfs /tmp \
            --unshare-ipc \
            --unshare-pid \
            --unshare-uts \
            --die-with-parent \
            python3 -c 'print("bubblewrap-ok")'

      - name: Build Tauri bundles
        run: pnpm exec tauri build

      - name: Packaged startup smoke
        run: pnpm run test:packaged-startup -- --json --no-build

      - name: Verify release signing custody
        shell: bash
        env:
          AURAONE_APPLE_ID: ${{ secrets.AURAONE_APPLE_ID }}
          AURAONE_APPLE_TEAM_ID: ${{ secrets.AURAONE_APPLE_TEAM_ID }}
          AURAONE_APPLE_APP_PASSWORD: ${{ secrets.AURAONE_APPLE_APP_PASSWORD }}
          AURAONE_NOTARY_KEY_P8: ${{ secrets.AURAONE_NOTARY_KEY_P8 }}
          AURAONE_NOTARY_KEY_ID: ${{ secrets.AURAONE_NOTARY_KEY_ID }}
          AURAONE_NOTARY_ISSUER_ID: ${{ secrets.AURAONE_NOTARY_ISSUER_ID }}
          AURAONE_WINDOWS_CERT_THUMBPRINT: ${{ secrets.AURAONE_WINDOWS_CERT_THUMBPRINT }}
          AURAONE_WINDOWS_PFX_PATH: ${{ secrets.AURAONE_WINDOWS_PFX_PATH }}
          AURAONE_WINDOWS_PFX_PASSWORD: ${{ secrets.AURAONE_WINDOWS_PFX_PASSWORD }}
          AURAONE_GPG_KEY_ID: ${{ secrets.AURAONE_GPG_KEY_ID }}
          AURAONE_RELEASE_GPG_PRIVATE_KEY: ${{ secrets.AURAONE_RELEASE_GPG_PRIVATE_KEY }}
        run: |
          case "${{ runner.os }}" in
            macOS)
              if [ -n "$AURAONE_NOTARY_KEY_P8" ]; then
                test -n "$AURAONE_NOTARY_KEY_ID"
                test -n "$AURAONE_NOTARY_ISSUER_ID"
              else
                test -n "$AURAONE_APPLE_ID"
                test -n "$AURAONE_APPLE_TEAM_ID"
                test -n "$AURAONE_APPLE_APP_PASSWORD"
              fi
              ;;
            Windows)
              test -n "${AURAONE_WINDOWS_CERT_THUMBPRINT}${AURAONE_WINDOWS_PFX_PATH}"
              if [ -n "$AURAONE_WINDOWS_PFX_PATH" ]; then
                test -n "$AURAONE_WINDOWS_PFX_PASSWORD"
              fi
              ;;
            Linux)
              test -n "$AURAONE_GPG_KEY_ID"
              test -n "$AURAONE_RELEASE_GPG_PRIVATE_KEY"
              ;;
          esac

      - name: Notarize macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        env:
          AURAONE_APPLE_ID: ${{ secrets.AURAONE_APPLE_ID }}
          AURAONE_APPLE_TEAM_ID: ${{ secrets.AURAONE_APPLE_TEAM_ID }}
          AURAONE_APPLE_APP_PASSWORD: ${{ secrets.AURAONE_APPLE_APP_PASSWORD }}
          AURAONE_NOTARY_KEY_P8: ${{ secrets.AURAONE_NOTARY_KEY_P8 }}
          AURAONE_NOTARY_KEY_ID: ${{ secrets.AURAONE_NOTARY_KEY_ID }}
          AURAONE_NOTARY_ISSUER_ID: ${{ secrets.AURAONE_NOTARY_ISSUER_ID }}
        run: scripts/sign-and-notarize-macos.sh desktop/src-tauri/target/release/bundle

      - name: Sign Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          AURAONE_WINDOWS_CERT_THUMBPRINT: ${{ secrets.AURAONE_WINDOWS_CERT_THUMBPRINT }}
          AURAONE_WINDOWS_PFX_PATH: ${{ secrets.AURAONE_WINDOWS_PFX_PATH }}
          AURAONE_WINDOWS_PFX_PASSWORD: ${{ secrets.AURAONE_WINDOWS_PFX_PASSWORD }}
        run: scripts/sign-windows.ps1 -ArtifactDirectory desktop/src-tauri/target/release/bundle

      - name: Import Linux release signing key
        if: runner.os == 'Linux'
        shell: bash
        env:
          AURAONE_RELEASE_GPG_PRIVATE_KEY: ${{ secrets.AURAONE_RELEASE_GPG_PRIVATE_KEY }}
        run: |
          printf '%s' "$AURAONE_RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Sign Linux artifacts
        if: runner.os == 'Linux'
        shell: bash
        env:
          AURAONE_GPG_KEY_ID: ${{ secrets.AURAONE_GPG_KEY_ID }}
        run: scripts/sign-linux.sh desktop/src-tauri/target/release/bundle

      - name: Generate artifact checksums
        shell: bash
        run: |
          mkdir -p release-checksums
          checksum_file() {
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$1"
            else
              shasum -a 256 "$1"
            fi
          }
          find desktop/src-tauri/target/release/bundle -type f \
            \( -name "*.dmg" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) \
            -print0 | sort -z | while IFS= read -r -d '' artifact; do
              checksum_file "$artifact"
            done > release-checksums/SHA256SUMS
          cat release-checksums/SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_path }}
            release-checksums/SHA256SUMS
          if-no-files-found: error

  publish-draft:
    name: Publish draft release
    needs: build
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist/release
          find dist/artifacts -type f \
            \( -name "*.dmg" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.asc" -o -name "*.sha256" -o -name "SHA256SUMS" \) \
            -exec cp {} dist/release/ \;

      - name: Import release signing key
        shell: bash
        env:
          AURAONE_RELEASE_GPG_PRIVATE_KEY: ${{ secrets.AURAONE_RELEASE_GPG_PRIVATE_KEY }}
        run: |
          test -n "$AURAONE_RELEASE_GPG_PRIVATE_KEY"
          printf '%s' "$AURAONE_RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Generate signed aggregate checksums
        shell: bash
        env:
          AURAONE_GPG_KEY_ID: ${{ secrets.AURAONE_GPG_KEY_ID }}
        run: |
          test -n "$AURAONE_GPG_KEY_ID"
          scripts/generate-checksums.sh dist/release

      - name: Verify publish custody
        shell: bash
        env:
          AURAONE_RELEASE_BOT_TOKEN: ${{ secrets.AURAONE_RELEASE_BOT_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
        run: |
          test -n "$AURAONE_RELEASE_BOT_TOKEN"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_R2_BUCKET"

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "dist/release/**"

      - name: Create or update draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.AURAONE_RELEASE_BOT_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          test -n "$GH_TOKEN"
          tag="v${VERSION}"
          title="Agent Studio Open ${VERSION} (${CHANNEL})"
          notes="Draft ${CHANNEL} release built from the public Agent Studio Open repository after release-custody checks. Windows and Linux artifacts require configured AuraOne signing secrets; SHA256SUMS.asc is generated from the hosted release GPG key."
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/release/* --clobber
          else
            gh release create "$tag" dist/release/* --draft --title "$title" --notes "$notes"
          fi
