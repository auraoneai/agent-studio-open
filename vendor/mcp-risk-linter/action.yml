name: MCP Risk Linter
description: Scan MCP server repositories for readiness risks.
author: AuraOne
branding:
  icon: shield
  color: blue
inputs:
  path:
    description: Path to scan.
    required: false
    default: "."
  fail-on:
    description: "Severity threshold that fails the action: low, medium, high, critical, or none."
    required: false
    default: "high"
  format:
    description: "Report format: markdown, json, or sarif."
    required: false
    default: "markdown"
  output:
    description: "Path where the report should be written."
    required: false
    default: "mcp-risk-report.md"
  comment:
    description: "Post or update a pull request comment with the report."
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        python -m pip install "${{ github.action_path }}"
        set +e
        mcp-risk-linter scan "${{ inputs.path }}" --fail-on "${{ inputs.fail-on }}" --format "${{ inputs.format }}" --out "${{ inputs.output }}"
        status=$?
        {
          echo "## MCP Risk Linter"
          echo
          echo "Report: \`${{ inputs.output }}\`"
          echo
          if [ "${{ inputs.format }}" = "markdown" ]; then
            cat "${{ inputs.output }}"
          else
            echo "Generated ${{ inputs.format }} report."
          fi
        } >> "$GITHUB_STEP_SUMMARY"
        echo "MCP_RISK_LINTER_STATUS=$status" >> "$GITHUB_ENV"
    - uses: actions/github-script@v8
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' }}
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- auraone:mcp-risk-linter -->';
          const report = fs.readFileSync('${{ inputs.output }}', 'utf8');
          const body = `${marker}\n${report}`;
          const comments = await github.paginate(github.rest.issues.listComments, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
    - shell: bash
      run: exit "$MCP_RISK_LINTER_STATUS"
